<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Prince Writer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
        .container { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1, h2 { margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; overflow-x: auto; display: block; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #2c3e2f; color: white; }
        .actions { margin: 1rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        button { background: #b87c4f; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .logout { margin-top: 2rem; }
        .error { color: red; }
        .note { font-size: 0.85rem; color: #666; margin-top: 1rem; }
        @media (max-width: 700px) { th, td { font-size: 0.75rem; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Admin Dashboard</h1>
    <div id="content">
        <p>Loading...</p>
    </div>
</div>
<script>
    const ADMIN_PASSWORD = 'liberian2025'; // CHANGE THIS!

    let auth = sessionStorage.getItem('adminAuth');
    if (auth !== ADMIN_PASSWORD) {
        const pwd = prompt('Enter admin password:');
        if (pwd === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminAuth', pwd);
        } else {
            document.getElementById('content').innerHTML = '<p class="error">Access denied.</p>';
            throw new Error('Unauthorized');
        }
    }

    // Load orders from localStorage
    let orders = JSON.parse(localStorage.getItem('orders') || '[]');

    function render() {
        let html = `<div class="actions">
            <button id="exportCsvBtn">📥 Export Orders to CSV</button>
            <button id="clearOrdersBtn" style="background:#c0392b;">🗑️ Clear All Orders</button>
        </div>`;

        if (orders.length === 0) {
            html += `<p><strong>Recent Book Orders (from localStorage):</strong> No orders yet.</p>`;
        } else {
            html += `<h2>Recent Book Orders (from localStorage)</h2>
            <table>
                <thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Email</th><th>Book</th></tr></thead>
                <tbody>`;
            // Most recent first
            [...orders].reverse().forEach(order => {
                html += `<tr>
                    <td>${order.timestamp || ''}</td>
                    <td>${escapeHtml(order.name || '')}</td>
                    <td>${escapeHtml(order.phone || '')}</td>
                    <td>${escapeHtml(order.email || '')}</td>
                    <td>${escapeHtml(order.book || '')}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
        }

        html += `<h2>Contact Form Submissions & Feedback</h2>
        <p>📧 Go to <a href="https://formspree.io/forms/xojbyazd/submissions" target="_blank" rel="noopener">Formspree Submissions Dashboard</a> to see all contact, newsletter, lead magnet, feedback, and order inquiries.</p>
        <p><strong>Tip:</strong> Export as CSV from Formspree for record keeping.</p>
        <div class="logout"><button onclick="sessionStorage.removeItem('adminAuth'); location.reload();">Logout</button></div>
        <div class="note">💡 Orders are stored in your browser's localStorage. This is for quick reference; Formspree also receives a copy.</div>`;

        document.getElementById('content').innerHTML = html;

        document.getElementById('exportCsvBtn')?.addEventListener('click', exportToCSV);
        document.getElementById('clearOrdersBtn')?.addEventListener('click', clearOrders);
    }

    function exportToCSV() {
        if (orders.length === 0) {
            alert('No orders to export.');
            return;
        }
        let csvRows = [['Date', 'Name', 'Phone', 'Email', 'Book']];
        orders.forEach(order => {
            csvRows.push([
                order.timestamp || '',
                order.name || '',
                order.phone || '',
                order.email || '',
                order.book || ''
            ]);
        });
        const csvContent = csvRows.map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `orders_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearOrders() {
        if (confirm('⚠️ Permanently delete all orders from localStorage? (Formspree data remains)')) {
            localStorage.removeItem('orders');
            orders = [];
            render();
            alert('All orders cleared.');
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    render();
</script>
</body>
</html>
